# nginx dev-конфиг для Windows (вызывается из start-nginx.bat).
# Слушает :8000 → раздаёт public/ + проксит .php на php-cgi.exe (порт 9000).
# Зеркало prod-конфига настолько, насколько это возможно на Windows
# (где штатного PHP-FPM не существует, используется php-cgi.exe).

worker_processes 1;
error_log logs/error.log warn;
pid       logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Абсолютный путь — иначе nginx ищет mime.types относительно cwd (.nginx/)
    # и валится. На Linux/проде тут "include mime.types;" — см. prod.linux.conf.
    include       D:/0projects/EXCEL/.nginx/conf/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip — на dev не критично, но включаем для парности с продом.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml;

    # Логи в .nginx/logs/, в репо не попадают.
    access_log logs/access.log;

    server {
        listen      127.0.0.1:8000;
        server_name localhost 127.0.0.1;

        # Абсолютный путь до public/ (Windows). Меняй если переносишь репо.
        root  D:/0projects/EXCEL/public;
        index index.php index.html;

        charset utf-8;
        client_max_body_size 60M;        # согласовано с MAX_IMPORT_BODY_BYTES (50 МБ + headroom)

        # Vite-ассеты — content-hashed, кэшируем агрессивно.
        location /build/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
            try_files $uri =404;
        }

        # Не отдаём служебные/dotfiles наружу.
        location ~ /\.(?!well-known) {
            deny all;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP через FastCGI → php-cgi.exe -b 127.0.0.1:9000 (запускается start-nginx.bat).
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            include        D:/0projects/EXCEL/.nginx/conf/fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            fastcgi_param  PATH_INFO        $fastcgi_path_info;
            fastcgi_read_timeout 60s;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }
    }
}
