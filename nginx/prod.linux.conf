# nginx prod-конфиг для Linux + PHP-FPM.
# Кладётся в /etc/nginx/sites-available/excel и активируется симлинком в sites-enabled/.
# Меняй server_name, root и SSL по среде.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # На проде сразу редирект на HTTPS. После настройки certbot — раскомментировать
    # listen 443 + ssl_certificate ниже, и удалить эти 2 строки.
    # return 301 https://$host$request_uri;

    root /var/www/excel/public;
    index index.php;
    charset utf-8;

    # Согласовано с SheetController::MAX_IMPORT_BODY_BYTES (50 МБ + headroom).
    client_max_body_size 60M;

    # Gzip — JS-бандл сжимается ~3.5x.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/html
        text/plain
        text/xml;

    # Vite-ассеты — content-hashed, кэшируем на год. Юзер качает 1 раз
    # за релиз, при следующем деплое хеш меняется → автоматический инвалид.
    location /build/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # Защита от доступа к скрытым файлам (.env, .git и т.п.)
    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }
}

# ==============================================================================
# HTTPS-вариант (включить ПОСЛЕ certbot --nginx -d your-domain.com).
# ==============================================================================
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#
#     # ... здесь повторить root, location, php и т.д. из http-блока выше ...
# }

# ==============================================================================
# /etc/php/8.2/fpm/pool.d/www.conf — пул PHP-FPM
# ==============================================================================
# pm = dynamic
# pm.max_children = 50
# pm.start_servers = 10
# pm.min_spare_servers = 5
# pm.max_spare_servers = 15
# pm.max_requests = 500
# php_admin_value[post_max_size]      = 60M
# php_admin_value[upload_max_filesize] = 60M
# php_admin_value[memory_limit]       = 256M

# ==============================================================================
# Активация:
#   sudo ln -s /etc/nginx/sites-available/excel /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo systemctl reload php8.2-fpm
# ==============================================================================
