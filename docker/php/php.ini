; Production-tuned PHP config для контейнера app.
; Кладётся в /usr/local/etc/php/conf.d/zz-app.ini → перебивает дефолты php:8.2-fpm-alpine.

memory_limit = 256M

; Размер импортируемого .xlsx — согласовано с client_max_body_size в nginx
; и с SheetController::MAX_IMPORT_BODY_BYTES (50 MB + headroom).
post_max_size       = 60M
upload_max_filesize = 60M
max_execution_time  = 60
max_input_time      = 60

date.timezone = UTC

; В контейнере STDERR подбирается docker-логом и доступен через `docker logs`.
log_errors = On
error_log  = /proc/self/fd/2

; Production: ошибки НЕ показываем в HTTP-ответах.
display_errors        = Off
display_startup_errors = Off

; Сессии — Laravel пишет в Redis, поэтому php-сессии не используются,
; но на всякий случай выключим автостарт.
session.auto_start = 0

expose_php = Off
