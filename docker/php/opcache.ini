; OPcache — production-режим.
; validate_timestamps=0 → не проверять mtime файлов. После каждого
; деплоя (новый образ → новый контейнер) OPcache сбрасывается автоматически,
; так что пересборки/перезагрузки внутри одного контейнера не предполагаются.

opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000
opcache.validate_timestamps     = 0
opcache.save_comments           = 1
opcache.fast_shutdown           = 1
opcache.jit                     = tracing
opcache.jit_buffer_size         = 64M
