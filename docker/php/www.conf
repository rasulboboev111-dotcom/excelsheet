; PHP-FPM пул для контейнера. Перекрывает дефолты php:8.2-fpm-alpine.

[www]
user  = www-data
group = www-data

listen = 9000

pm                   = dynamic
pm.max_children      = 30
pm.start_servers     = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests      = 500

; STDOUT/STDERR воркеров → docker logs.
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
