# nginx config внутри контейнера nginx (см. Dockerfile target=nginx).
# Слушает 80 → static из /var/www/html/public + FastCGI на app:9000.
# SSL терминирует наружный proxy (Cloudflare / host nginx / Traefik) —
# в самом контейнере SSL не делаем, чтобы не возиться с volume-сертификатами.

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;
    charset utf-8;

    client_max_body_size 60M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml;

    # Vite-ассеты — content-hashed, кэшируем агрессивно.
    location /build/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # Защита от dot-файлов (.env, .git и т.п.).
    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP → app:9000 (по compose-network).
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
