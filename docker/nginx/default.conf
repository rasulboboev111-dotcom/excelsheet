# nginx config внутри контейнера nginx (см. Dockerfile target=nginx).
# Слушает 80 → static из /var/www/html/public + FastCGI на app:9000.
# SSL терминирует наружный proxy (Cloudflare / host nginx / Traefik) —
# в самом контейнере SSL не делаем, чтобы не возиться с volume-сертификатами.

# Cloudflare-friendly real_ip. Если перед nginx стоит CF, заголовок
# CF-Connecting-IP содержит реальный IP клиента. Без этих директив nginx
# (и Laravel за ним) видят только IP CF-edge, и rate-limit ломается для всех.
# Список IPv4-диапазонов CF: https://www.cloudflare.com/ips-v4 (обновляется редко).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Internal docker-сеть тоже trust'им (для nginx ↔ app коммуникации).
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;
    charset utf-8;

    client_max_body_size 60M;

    # Gzip — уровень 6 (vs дефолт 1) сжимает на 10-15% сильнее за приемлемый CPU.
    # gzip_static — если рядом с файлом лежит .gz, отдаём готовый без runtime-сжатия.
    gzip on;
    gzip_vary on;
    gzip_static on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/wasm
        application/x-font-ttf
        application/octet-stream
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml
        text/javascript;

    # Brotli не настраиваем здесь: ngx_brotli требует load_module в main-секции
    # nginx.conf, а у nginx:alpine main-конфиг не включает modules-enabled/*.conf
    # автоматически. Альтернатива: ставить Cloudflare как proxy → он отдаёт Brotli
    # клиентам автоматически без всяких модулей nginx. См. README.

    # Vite-ассеты — content-hashed, кэшируем агрессивно.
    location /build/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # Защита от dot-файлов (.env, .git и т.п.).
    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP → app:9000 (по compose-network).
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
