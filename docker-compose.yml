# Production-ready docker-compose для Excel Tojiktelecom.
#
# Запуск:
#   1. cp .env.docker.example .env
#   2. nano .env   # заполнить пароли и APP_URL
#   3. docker compose up -d --build
#
# Управление:
#   docker compose logs -f app          # логи Laravel
#   docker compose exec app bash        # shell в контейнере
#   docker compose exec app php artisan tinker
#   docker compose down                 # остановить (данные сохраняются в volumes)
#   docker compose down -v              # ОПАСНО: удалить и базу с редисом тоже

services:
  # =====================================================
  # PHP-FPM приложение
  # =====================================================
  app:
    build:
      context: .
      target: app
    image: excel-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Перебиваем хосты на compose-имена (контейнеры в одной сети).
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      # storage/ нужно сохранять между перезапусками — туда пишутся логи и временные файлы.
      - app-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Проверяем что PHP-FPM слушает порт 9000. fsockopen — встроенный в PHP,
      # не требует дополнительных пакетов. start_period большой потому что
      # entrypoint делает migrations + cache + pre-migration backup до старта
      # fpm — это может занять ~30-60 секунд на медленном диске.
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 9000) ? 0 : 1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - excel

  # =====================================================
  # Nginx — раздаёт статику и проксит PHP на app:9000
  # =====================================================
  nginx:
    build:
      context: .
      target: nginx
    image: excel-nginx:latest
    restart: unless-stopped
    ports:
      # Если ставишь Cloudflare/Traefik перед — биндь только на 127.0.0.1
      # (например "127.0.0.1:8080:80"), чтобы наружу выйти можно было только через прокси.
      - "${NGINX_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      # / отдаёт redirect на /login или dashboard — оба коды 2xx/3xx.
      # 3-секундный timeout на случай медленного PHP-FPM.
      test: ["CMD-SHELL", "wget -q -O /dev/null --timeout=3 http://localhost/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - excel

  # =====================================================
  # PostgreSQL 16
  # =====================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-excel_db}
      POSTGRES_USER: ${DB_USERNAME:-excel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-excel_user} -d ${DB_DATABASE:-excel_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - excel

  # =====================================================
  # Redis 7 (cache + sessions)
  # =====================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - excel

  # =====================================================
  # Queue worker — обрабатывает очередь redis (отправка email через
  # Gmail API и любые будущие async-задачи). Без воркера задачи копятся
  # в Redis, юзер видит мгновенный ответ, но письма не уходят.
  # `--tries=3 --backoff=10` — ретраи при сбоях Gmail API.
  # `--timeout=120` — на 50К строк xlsx нужно время.
  # =====================================================
  queue:
    image: excel-app:latest
    restart: unless-stopped
    env_file: .env
    # При `docker compose down` / restart Docker шлёт SIGTERM воркеру.
    # Без stop_grace_period дефолт = 10s — Laravel-воркер не успевает завершить
    # текущую job (email через Gmail может идти 30-90s). Ставим 150s — чуть
    # больше чем --timeout=120s ниже, плюс запас на graceful flush.
    stop_grace_period: 150s
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "[queue] starting worker";
        exec php artisan queue:work redis --tries=3 --backoff=10 --timeout=120 --sleep=3 --max-time=3600
    healthcheck:
      # Worker считается живым, если может пингануть Redis (откуда берёт задачи).
      # Если Redis недоступен — worker всё равно крутится, но бесполезно — лучше рестарт.
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(getenv(\"REDIS_HOST\"), (int)(getenv(\"REDIS_PORT\")?:6379)) ? 0 : 1);'"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - excel

  # =====================================================
  # Laravel scheduler — запускает audit-log:cleanup и любые
  # будущие cron-задачи. Просто бесконечный цикл `schedule:run`.
  # =====================================================
  scheduler:
    image: excel-app:latest
    restart: unless-stopped
    # Дефолтные 10s SIGTERM-grace может оборвать `schedule:run` посередине
    # (например cleanup audit-log пишет в БД). 30s — небольшой запас на
    # завершение типичной cron-задачи.
    stop_grace_period: 30s
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        # Не делаем migrate — это уже сделал app-контейнер.
        echo "[scheduler] starting loop";
        # Touch heartbeat-файл при каждом тике, чтобы healthcheck видел что петля жива.
        while true; do
          touch /tmp/scheduler.heartbeat;
          php artisan schedule:run >/dev/null 2>&1;
          sleep 60;
        done
    healthcheck:
      # Проверяем что heartbeat-файл обновлялся за последние 90 секунд (петля
      # тикает раз в ~60s + sleep, +30s запас). Если зависла — рестарт.
      test: ["CMD-SHELL", "test -f /tmp/scheduler.heartbeat && [ $(($(date +%s) - $(stat -c %Y /tmp/scheduler.heartbeat))) -lt 90 ] || exit 1"]
      interval: 60s
      timeout: 3s
      retries: 2
      start_period: 30s
    networks:
      - excel

  # =====================================================
  # Backup — ежедневный pg_dump в named volume + опциональная отгрузка в S3.
  # Чтобы включить S3 — пропиши в .env:
  #   BACKUP_RCLONE_REMOTE=s3:my-bucket/excel    (имя remote'а должно быть в rclone.conf)
  # rclone.conf монтируется через volume `backup-rclone-config` —
  # docker compose run --rm backup rclone config  → пройти setup один раз.
  # Если BACKUP_RCLONE_REMOTE не задан — бэкапы только локальные (volume).
  # =====================================================
  backup:
    build:
      context: ./docker/backup
    image: excel-backup:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-excel_db}
      DB_USERNAME: ${DB_USERNAME:-excel_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_RETENTION_LOCAL_DAYS: ${BACKUP_RETENTION_LOCAL_DAYS:-30}
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-}
    volumes:
      # ./backups — bind-mount в папку проекта на хосте. Намеренно НЕ named volume:
      # named volume легко удалить через `docker compose down -v` или потерять при
      # пересоздании Docker Desktop, плюс его не видно из ОС для off-site копирования
      # через rsync/cron. Папка ./backups видна в файлменеджере, легко скопировать
      # на сетевой диск, USB или настроить syncthing/rclone-host.
      - ./backups:/backups
      - backup-rclone-config:/root/.config/rclone
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # crond живой → процесс crond есть в /proc. Альтернатива — pgrep crond,
      # но pgrep в alpine из procps; pidof busybox-friendly.
      test: ["CMD-SHELL", "pidof crond > /dev/null || exit 1"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - excel

networks:
  excel:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  app-storage:
  backup-rclone-config:
